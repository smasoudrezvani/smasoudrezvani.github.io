  title: "AutoAugment: Learning Augmentation Policies from Data"
  authors: Ekin D. Cubu et al.
  journal: archive
  year: 2019
  link: https://arxiv.org/abs/1805.09501
  why: Pioneered the shift from manually designed data augmentation to automated,
    data-driven approaches in computer vision (RL).
  summary: 'AutoAugment frames augmentation design as a search problem ---> The Search
    Space: A Policy of Sub-Policies : A policy consists of 5 sub-policies. For each
    image in a mini-batch, one sub-policy is chosen at random and applied. Each sub-policy
    has 2 operations (applied sequentially) ---> They use a RNN controller that predicts
    augmentation policies. The controller has 30 softmax predictions. 1. Train a "child
    model" (small neural network) on the target dataset using this augmentation policy


    2. Evaluate the child model on a validation set to get accuracy


    3. Use that accuracy as a reward signal to update the controller via Proximal
    Policy Optimization (PPO)                Insane part : these policies transfer
    to other datasets and architectures!'
